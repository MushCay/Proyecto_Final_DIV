<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editoriales</title>
    <link rel="stylesheet" href="styleEditorial.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <!--SECCION DE MENU-->
    <header class="navbar">
        <h1 class="logo">MangaStore</h1>
        <button class="btn-caja"><i data-lucide="user"></i> Caja</button>
    </header>

    <nav class="tabs">
        <button class="tab" id="pp-nav"><i data-lucide="star"></i> Inicio</button>
        <button class="tab" id="btn-nav-ventas"><i data-lucide="bookmark"></i> Venta</button>
        <button class="tab" id="btn-nav-mangas"><i data-lucide="book-open"></i> Mangas</button>
        <button class="tab active"><i data-lucide="folder"></i> Editoriales</button>
    </nav>
    <div class="contenedor-principal">
        <div class="contenedor-botones">
            <input type="button" id="btn1" class="btns" value="Agregar Editorial" onclick="mapForm('agregar')">
            <input type="button" id="btn2" class="btns" value="Actualizar Editorial" onclick="mapForm('actualizar')">
            <input type="button" id="btn2" class="btns" value="Eliminar Editorial" onclick="mapForm('eliminar')">
            <input type="button" class="btns" value="Filtrar Editorial" onclick="mapFormVentas('Filtrar')">
        </div>
        <table id="tablaEditorial">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Pais</th>
                </tr>
            </thead>

            <tbody>
                <!-- Los datos de Flask se inyectarán aquí mediante JS -->
            </tbody>

        </table>

        <div id="Form" class="">

        </div>
    </div>
    <footer class="bottom-bar">
        <i data-lucide="log-out" class="exit-icon"></i>
    </footer>

    <script src="editorial.js"></script>

</body>

</html>
